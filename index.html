<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Match - Start</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Emotion Game for Kids</h1>

    <section class="carousel-card">
      <button id="leftBtn" class="arrow">←</button>
      <div class="card">
        <img id="carouselImg" src="" alt="expression photo" />
        <h2 id="carouselLabel">happy</h2>
      </div>
      <button id="rightBtn" class="arrow">→</button>
    </section>

    <section class="rules">
      <h2>Rules</h2>
      <ul>
        <li>Loo at the word and photo in the carousel.</li>
        <li>Learn the emotion name: happy, sad, angry, surprised.</li>
        <li>Press Start to play.</li>
        <li>In game, tap the matching face.</li>
      </ul>
    </section>

    <button id="startBtn" class="start">Start Game</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
