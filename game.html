<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Emoji Match - Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Find the Right Emotion</h1>

    <div id="targetBox" class="target-box">Target: 
    <span id="targetName"></span></div>
    <div id="scoreBox" class="score-box">Correct: 0 / 5</div>

    <div id="choicesGrid" class="grid"></div>

    <div id="resultBox" class="result hidden"></div>
    <button id="restartBtn" class="start hidden">Play Again</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
